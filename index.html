<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>现代毛玻璃设计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', '微软雅黑', sans-serif;
            overflow-x: hidden;
        }

        /* ============ 首屏渐变背景 ============ */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #fdf2f8 0%, #fde8f0 50%, #fdd9e5 100%);
            z-index: -2;
            /* 细网格纹理 */
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.05) 75%, rgba(255, 255, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.05) 75%, rgba(255, 255, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: 20px 20px;
            overflow: hidden;
        }

        /* ============ 首屏内容 ============ */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            z-index: 1;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            color: #2d2d2d;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(242, 132, 160, 0.1);
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #666;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* ============ 毛玻璃文本框 - 首屏 ============ */
        .glass-box {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(242, 132, 160, 0.4);
            border-radius: 16px;
            padding: 30px 40px;
            max-width: 500px;
            color: #2d2d2d;
            text-align: center;
            box-shadow: 0 8px 32px rgba(242, 132, 160, 0.1);
            position: relative;
            z-index: 2;
        }

        .glass-box h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #2d2d2d;
        }

        .glass-box p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 15px;
        }

        .glass-box button {
            background: linear-gradient(135deg, #f28480 0%, #f2849a 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(242, 132, 160, 0.3);
        }

        .glass-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(242, 132, 160, 0.4);
        }

        /* ============ 下滑背景与内容区 ============ */
        .content-wrapper {
            margin-top: 100vh;
            min-height: 200vh;
            background-color: #f5f5f5;
            padding: 80px 20px;
            /* 20px方格纹理 */
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(200, 200, 200, 0.05) 25%, rgba(200, 200, 200, 0.05) 26%, transparent 27%, transparent 74%, rgba(200, 200, 200, 0.05) 75%, rgba(200, 200, 200, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(200, 200, 200, 0.05) 25%, rgba(200, 200, 200, 0.05) 26%, transparent 27%, transparent 74%, rgba(200, 200, 200, 0.05) 75%, rgba(200, 200, 200, 0.05) 76%, transparent 77%, transparent);
            background-size: 20px 20px;
            position: relative;
            z-index: 1;
        }

        /* ============ 内容卡片 ============ */
        .content-card {
            max-width: 900px;
            margin: 0 auto 50px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .content-card h2 {
            font-size: 1.8rem;
            color: #2d2d2d;
            margin-bottom: 20px;
        }

        .content-card p {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        /* ============ 毛玻璃输入框 ============ */
        .glass-input-group {
            margin: 30px 0;
        }

        .glass-input-group label {
            display: block;
            margin-bottom: 10px;
            color: #2d2d2d;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .glass-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(242, 132, 160, 0.4);
            border-radius: 10px;
            font-size: 0.95rem;
            color: #2d2d2d;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .glass-input::placeholder {
            color: rgba(45, 45, 45, 0.4);
        }

        .glass-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(242, 132, 160, 0.6);
            box-shadow: 0 0 15px rgba(242, 132, 160, 0.2);
        }

        .glass-textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(242, 132, 160, 0.4);
            border-radius: 10px;
            font-size: 0.95rem;
            color: #2d2d2d;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            transition: all 0.3s ease;
        }

        .glass-textarea::placeholder {
            color: rgba(45, 45, 45, 0.4);
        }

        .glass-textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(242, 132, 160, 0.6);
            box-shadow: 0 0 15px rgba(242, 132, 160, 0.2);
        }

        /* ============ 功能按钮 ============ */
        .submit-btn {
            background: linear-gradient(135deg, #f28480 0%, #f2849a 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(242, 132, 160, 0.3);
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(242, 132, 160, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* ============ 特性列表 ============ */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(242, 132, 160, 0.4);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .feature-card .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .feature-card h3 {
            color: #2d2d2d;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .feature-card p {
            color: #666;
            font-size: 0.9rem;
        }

        /* ============ 响应式设计 ============ */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }

            .glass-box {
                max-width: 100%;
                padding: 20px 30px;
            }

            .content-card {
                padding: 20px;
            }

            .content-card h2 {
                font-size: 1.3rem;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ============ 滚动指示器 ============ */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        .scroll-indicator svg {
            width: 24px;
            height: 24px;
            stroke: #f*
